<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Narrare Pipeline</title>
    <link rel="stylesheet" href="/static/styles.css?v=voice-assignment-2" />
  </head>
  <body>
    <header>
      <div>
        <h1>Narrare Workspace</h1>
        <p>Compare source, intermediate artifacts, and script IR side by side.</p>
      </div>
    </header>

    <main>
      <section class="context-bar" aria-label="Shared artifact context">
        <label>
          Source
          <select id="source-select"></select>
        </label>
        <label>
          Project ID
          <input id="project-id" type="text" autocomplete="off" />
        </label>
        <span id="global-status" class="status"></span>
      </section>

      <section class="workspace" aria-label="Artifact comparison workspace">
        <article class="panel" data-panel="left">
          <div class="panel-toolbar">
            <label>
              Left Panel
              <select id="left-view-select" class="view-select"></select>
            </label>
            <span id="left-status" class="status"></span>
          </div>
          <div id="left-panel" class="panel-content"></div>
        </article>

        <article class="panel" data-panel="right">
          <div class="panel-toolbar">
            <label>
              Right Panel
              <select id="right-view-select" class="view-select"></select>
            </label>
            <span id="right-status" class="status"></span>
          </div>
          <div id="right-panel" class="panel-content"></div>
        </article>
      </section>
    </main>

    <script src="/static/app.js?v=default-project-1"></script>
  </body>
</html>
